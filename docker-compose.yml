# Optional: run PostgreSQL for local development
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bobamap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bobamap_pg:/var/lib/postgresql/data

volumes:
  bobamap_pg:
